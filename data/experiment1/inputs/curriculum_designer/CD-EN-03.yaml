program_name: "Responsible AI in Practice — Cross-Disciplinary Certificate"
institutions: "HCMUT, HUST, RMIT Vietnam, Intel Vietnam"
goals: "Develop critical understanding of ethical, legal, and social dimensions of AI deployment across engineering, business, and policy contexts; equip students to conduct structured ethical risk assessments of AI systems; build capacity to communicate AI risks and governance requirements to non-technical stakeholders; prepare students for roles that require interdisciplinary collaboration on AI governance"
audience: "Mixed cohort of postgraduate students from engineering, business administration, and public policy programmes; no technical AI prerequisite required — the programme is designed to be accessible to students with varying technical backgrounds"
duration: "10 weeks, 2.5 contact hours per week"
constraints: "Content must be accessible to non-technical students while remaining substantive for engineering students — differentiated assessment tasks may be needed; RMIT Vietnam to lead the legal and regulatory modules; Intel Vietnam to provide industry case studies; must align with UNESCO Recommendation on AI Ethics (2021) as the normative framework; synchronous online delivery for inter-institution sessions, asynchronous materials for self-study components"
language: "en"
