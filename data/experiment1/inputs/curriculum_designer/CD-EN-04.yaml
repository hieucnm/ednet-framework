program_name: "AI for Engineering Managers — Professional Upskilling Programme"
institutions: "HCMUT, Intel Vietnam"
goals: "Enable mid-career engineering managers to make informed decisions about AI adoption in product development and operations; develop ability to scope AI projects, evaluate technical proposals, and manage cross-functional AI teams; provide working knowledge of AI system capabilities and limitations without requiring programming proficiency"
audience: "Mid-career engineers and engineering team leads with 5 or more years of industry experience; participants are expected to have management or technical leadership responsibilities; no programming or machine learning background required"
duration: "6 weeks, 3 hours per week"
constraints: "Programme must be deliverable entirely in evening sessions or weekend formats to accommodate working professionals; no coding assignments — all practical exercises use no-code or low-code tools; Intel Vietnam to contribute at least two senior engineering speakers from its Vietnam operations; certificate to be awarded by HCMUT with acknowledgement of Intel Vietnam as industry partner; cohort size capped at 30 participants per intake"
language: "en"
