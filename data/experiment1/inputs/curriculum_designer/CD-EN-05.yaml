program_name: "Master of Engineering in AI Systems — Joint Degree Programme"
institutions: "HCMUT, NUS, HUST"
goals: "Deliver a research-informed postgraduate degree that combines AI engineering depth with semiconductor systems knowledge; develop graduates capable of leading applied AI research and advanced engineering development in industry and academia; establish a sustainable joint degree infrastructure reusable for future collaborative programmes across VASTN member institutions"
audience: "Students holding a bachelor's degree in computer engineering, electrical engineering, computer science, or a closely related field with a minimum GPA equivalent to 7.0 out of 10; international applicants are eligible; programme targets students seeking careers in AI research, semiconductor design, and AI systems engineering"
duration: "2 years full-time (4 semesters)"
constraints: "Degree must be jointly conferred by all three institutions and recognised under Vietnamese higher education regulations and Singapore CPE requirements; Semester 1 and 2 to be delivered at HCMUT, Semester 3 at NUS with option for HUST; Semester 4 is thesis research jointly supervised across institutions; credit framework must comply with Thong tu 38/2020 for the Vietnamese component; tuition fee structure and scholarship allocation require steering committee approval before programme launch; English is the language of instruction throughout"
language: "en"
