institutions: "HCMUT (Ho Chi Minh City University of Technology), NUS (National University of Singapore)"
purpose: "Establish a structured bilateral framework for joint postgraduate research supervision, faculty exchange, and co-development of advanced AI and semiconductor engineering curriculum within the VASTN consortium"
period: "5 years from date of signing, with annual review"
activities: "Joint supervision of doctoral and master's research students at a rate of at least two jointly supervised students per year; reciprocal short-term faculty exchanges of one to four weeks, targeting four exchanges per year; co-development of at least three curriculum modules per academic year for the VASTN joint certificate programme; joint applications for external research funding with alternating lead applicant roles; annual joint research seminar alternating between HCMUT and NUS campuses"
constraints: "IP ownership for jointly developed outputs to be shared equally unless agreed otherwise in writing before activity commencement; publications require a mutual 45-day review period before submission; student exchange credit recognition limited to pre-approved modules with a maximum of 18 credit units per semester at NUS; all financial arrangements for specific activities to be negotiated separately under this framework; governing law and dispute resolution mechanism to be agreed by legal teams"
language: "en"
