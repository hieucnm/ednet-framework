institutions: "VASTN Consortium (HCMUT, HUST, NUS, RMIT Vietnam), TU Delft (Netherlands), KTH Royal Institute of Technology (Sweden)"
purpose: "Establish a project collaboration framework for a proposed Erasmus+ Capacity Building in Higher Education application focused on strengthening AI and semiconductor engineering education in Vietnam through curriculum modernisation, staff development, and quality assurance capacity building"
period: "3 years, aligned with Erasmus+ project grant cycle, commencing upon grant award (estimated Q1 2025)"
activities: "Joint curriculum development for two new AI engineering modules compliant with AUN-QA Version 4.0 standards; three staff development workshops hosted alternately at TU Delft, KTH, and HCMUT; establishment of a quality assurance peer review mechanism between VASTN and EU partner institutions; student short-term exchange programme of two to four weeks for up to 20 VASTN students per year at TU Delft or KTH; joint publication of a best-practice guide on industry-integrated AI engineering education in Southeast Asia"
constraints: "At least 70 percent of Erasmus+ grant funds must be spent within VASTN partner countries per European Commission rules; HCMUT designated as lead applicant and grant administrator; TU Delft and KTH roles as EU coordinator institutions; all procurement must follow EU grant procurement rules; project reporting to European Commission on six-month cycles; continuation of activities beyond grant period subject to separate sustainability plan to be agreed by all parties before project end"
language: "en"
