institutions: "HCMUT (Ho Chi Minh City University of Technology), Bosch Vietnam Engineering"
purpose: "Establish an applied research collaboration framework for joint investigation of predictive maintenance solutions using embedded AI on Bosch manufacturing equipment at the Dong Nai production facility, with the dual goal of producing publishable research findings and a deployable prototype system"
period: "18 months from project kick-off, with option to extend by 6 months by mutual written agreement"
activities: "Joint research project on predictive maintenance using sensor data from Bosch Dong Nai production line; HCMUT to provide research team of one faculty member and two postgraduate students; Bosch to provide anonymised operational sensor data, engineering liaison, and access to the production facility for data collection visits of up to four per year; joint authorship of at least one peer-reviewed conference or journal paper; development of a prototype anomaly detection system with documented performance benchmarks"
constraints: "Bosch retains the right to request a 90-day confidentiality hold on publication to assess commercial sensitivity; IP for jointly developed prototype and algorithms to be jointly owned; Bosch internal data shared under a data processing agreement to be drafted by Bosch legal team; research findings must not identify specific production line configurations in published outputs without Bosch approval; HCMUT to carry own staff and student costs; Bosch to cover data collection visit logistics and provide equipment access at no charge"
language: "en"
