institutions: "HCMUT (Ho Chi Minh City University of Technology), RMIT University Vietnam"
purpose: "Establish a short-term student mobility arrangement allowing final-year undergraduate students from each institution to complete elective modules at the partner institution, with mutual credit recognition, in support of the VASTN interdisciplinary education objectives"
period: "2 academic years (2024–2025 and 2025–2026), renewable by mutual agreement"
activities: "Reciprocal acceptance of up to 10 students per semester from each institution for elective module enrolment; eligible modules to be drawn from a jointly agreed list reviewed annually; credit recognition of up to 9 credit units per semester at HCMUT and equivalent at RMIT Vietnam; joint orientation session for incoming exchange students at the start of each semester; end-of-programme review meeting between student affairs coordinators from both institutions"
constraints: "Students must meet English proficiency requirements of the host institution; tuition fees waived reciprocally under this arrangement — students pay fees only to home institution; accommodation and living costs borne by students; academic disputes to be resolved under the host institution's regulations with right of appeal to a joint academic committee; arrangement does not constitute a formal joint degree or double degree programme"
language: "en"
