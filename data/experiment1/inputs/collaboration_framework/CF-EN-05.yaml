institutions: "HCMUT, HUST, NUS, Intel Vietnam, Bosch Vietnam"
purpose: "Establish a multi-party knowledge transfer and workforce development framework enabling systematic sharing of industry expertise, research capabilities, and training resources across the VASTN network, in support of Vietnam's national strategy for AI and semiconductor talent development"
period: "3 years, with a mid-term review at 18 months and renewal option subject to steering committee approval"
activities: "Annual joint workforce needs assessment across all five parties to identify skill gaps and prioritise training investments; co-development and delivery of at least two new short courses per year addressing identified priority skill gaps, with joint certification from university and industry partners; industry mentorship programme pairing HCMUT and HUST postgraduate students with Intel Vietnam and Bosch Vietnam engineers, targeting 30 pairings per year; shared access to licensed software tools across university partners, coordinated through a centralised licence management mechanism; annual VASTN Innovation Challenge open to students from both universities, with industry partners setting challenge briefs and judging panels"
constraints: "Governance to be managed by a steering committee with one representative per party meeting quarterly; financial contributions from each party to be negotiated in a separate cost-sharing annex before programme launch; Intel Vietnam and Bosch Vietnam contributions may be in-kind (equipment, staff time, licences) rather than cash; steering committee decisions on resource allocation require consensus of all five parties; any party may withdraw from specific activities with 60 days notice without terminating the overall framework; data shared between parties for workforce needs assessment to be anonymised and aggregated"
language: "en"
